<!doctype html>
<html>
  <head>
    <style>
      html,
      body {
        background: none;
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        overflow: hidden;
      }
      #canvas {
        display: block;
        width: 100%;
        height: 100%;
        opacity: 0;
      }
      #canvas.ready {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <div id="rive-fps-counter" style="display: none; position: absolute; top: 12px; left: 12px; background-color: black; color: white; font: 20px Gotham, sans-serif; border-radius: 8px; padding: 8px 12px; z-index: 1000;">FPS: --</div>

    <script src="https://beta.singular.live/libs/singularwidget/1.0.4/singularwidget.js"></script>

    <script>
    // =========================================================================
    // State — single source of truth
    // =========================================================================

    const widgetState = {
      riveProps: {},
      r: null,
      riveReady: false,
      artboardName: "",
      stateMachineName: "",
      layoutFit: "",
      fileUrl: "",
      runtime: "",
      stateMachineIndex: 0,
      displayFpsCounter: false,
      pendingInitialValues: null,
      vmMetadata: {},
      defaultVMName: "",
      _findVMNameForInstance: null,

      layoutOptions: [
        "Contain", "Cover", "Fill", "FitWidth", "FitHeight", "ScaleDown", "Layout", "None",
      ],
      runtimeSources: {
        webgl2: "https://unpkg.com/@rive-app/webgl2",
        canvas: "https://unpkg.com/@rive-app/canvas",
      },
    };

    // =========================================================================
    // Utilities
    // =========================================================================

    function toAlphanumericId(str) {
      return str.replace(/[^a-zA-Z0-9]/g, "");
    }

    function riveColorValueToRGBA(colorValue) {
      return {
        r: (colorValue >> 16) & 0xff,
        g: (colorValue >> 8) & 0xff,
        b: colorValue & 0xff,
        a: ((colorValue >> 24) & 0xff) / 255,
      };
    }

    // =========================================================================
    // Runtime — WebGL2 / Canvas toggle
    // =========================================================================

    function waitForRiveGlobal() {
      return new Promise((resolve, reject) => {
        const start = Date.now();
        const timer = setInterval(() => {
          if (window.rive && typeof window.rive.Rive === 'function') {
            clearInterval(timer);
            resolve();
          } else if (Date.now() - start > 5000) {
            clearInterval(timer);
            reject(new Error('Timed out waiting for Rive global'));
          }
        }, 50);
      });
    }

    async function toggleRiveRuntime(desiredRuntime) {
      if (widgetState.runtime === desiredRuntime && window.rive) return;

      const existing = document.getElementById("rive-runtime-script");
      try {
        existing.remove();
        widgetState.r?.cleanup();
        delete window.rive;
      } catch {}

      const script = document.createElement("script");
      script.id = "rive-runtime-script";
      script.src = widgetState.runtimeSources[desiredRuntime];
      document.body.prepend(script);

      await new Promise((resolve, reject) => {
        script.onload = async () => {
          try {
            await waitForRiveGlobal();
            widgetState.runtime = desiredRuntime;
            resolve();
          } catch (e) { reject(e); }
        };
        script.onerror = () => reject(new Error(`Failed to load ${desiredRuntime}`));
      });
    }

    // =========================================================================
    // Canvas & FPS
    // =========================================================================

    function resizeCanvas() {
      const canvas = document.getElementById("canvas");
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      widgetState.r?.resizeDrawingSurfaceToCanvas();
    }

    window.addEventListener("resize", resizeCanvas);

    function ensureFPSCounter(instance) {
      const overlay = document.getElementById("rive-fps-counter");
      if (widgetState.displayFpsCounter) {
        overlay.style.display = "block";
        try {
          instance.enableFPSCounter((fps) => {
            if (widgetState.displayFpsCounter) {
              overlay.textContent = `FPS: ${Math.round(fps)}`;
            }
          });
        } catch {}
      } else {
        overlay.style.display = "none";
      }
    }

    // =========================================================================
    // ViewModel — read / write / discover
    // =========================================================================

    function readInstanceProperties(instance) {
      const obj = {};
      for (const _p of instance.properties) {
        try {
          if (_p.type === "string")       obj[_p.name] = instance.string(_p.name)?.value ?? "";
          else if (_p.type === "number")  obj[_p.name] = instance.number(_p.name)?.value ?? 0;
          else if (_p.type === "boolean") obj[_p.name] = instance.boolean(_p.name)?.value ?? false;
        } catch {}
      }
      return obj;
    }

    function applyPropsToInstance(inst, itemData) {
      for (const key of Object.keys(itemData)) {
        if (key.startsWith('_')) continue;
        const val = itemData[key];
        try {
          if (typeof val === 'string')       { const a = inst.string(key);  if (a) a.value = val; }
          else if (typeof val === 'number')  { const a = inst.number(key);  if (a) a.value = val; }
          else if (typeof val === 'boolean') { const a = inst.boolean(key); if (a) a.value = val; }
        } catch {}
      }
    }

    function getAllViewModelProperties(riveInst) {
      const props = {};
      const vmMetadata = {};

      if (riveInst.viewModelCount === 0) return { props, vmMetadata, defaultVMName: "" };

      const _defaultVM = riveInst.defaultViewModel();
      let vmi = riveInst.viewModelInstance;
      let defaultVM = _defaultVM;

      if (!defaultVM) return { props, vmMetadata, defaultVMName: "" };

      const _autoHasList = defaultVM.properties.some(p => p.type === "list");
      if (!_autoHasList || !vmi) {
        let chosenVM = null;
        for (let _vi = 0; _vi < riveInst.viewModelCount; _vi++) {
          const _v = riveInst.viewModelByIndex(_vi);
          if (_v && _v.properties.some(p => p.type === "list")) { chosenVM = _v; break; }
        }
        if (!chosenVM) chosenVM = defaultVM;
        const _newInst = chosenVM.defaultInstance() ?? chosenVM.instance();
        if (_newInst) {
          riveInst.bindViewModelInstance(_newInst);
          vmi = _newInst;
          defaultVM = chosenVM;
        } else if (!vmi) {
          return { props, vmMetadata, defaultVMName: "" };
        }
      }

      const defaultVMName = defaultVM.name;
      const processedVMs = new Set();

      function findVMNameForInstance(instance) {
        if (!instance) return null;
        try {
          const instanceProps = instance.properties;
          for (let _vi = 0; _vi < riveInst.viewModelCount; _vi++) {
            const _vm = riveInst.viewModelByIndex(_vi);
            if (!_vm) continue;
            const _vmProps = _vm.properties;
            if (_vmProps.length !== instanceProps.length) continue;
            if (instanceProps.every(ip => _vmProps.find(vp => vp.name === ip.name && vp.type === ip.type))) return _vm.name;
          }
        } catch {}
        return null;
      }

      function processViewModel(vm, pathPrefix) {
        if (processedVMs.has(vm)) return;
        processedVMs.add(vm);

        for (const property of vm.properties) {
          const propertyPath = pathPrefix ? `${pathPrefix}/${property.name}` : property.name;

          if (property.type === "viewModel") {
            let matchedVM = null;
            for (let i = 0; i < riveInst.viewModelCount; i++) {
              const nestedVM = riveInst.viewModelByIndex(i);
              if (!nestedVM || processedVMs.has(nestedVM)) continue;
              if (nestedVM.name && property.name.includes(nestedVM.name)) { matchedVM = nestedVM; break; }
            }
            if (matchedVM) {
              vmMetadata[property.name] = { vmName: matchedVM.name, parentProp: property.name, parentVMName: vm.name };
              processViewModel(matchedVM, property.name);
            }
            continue;
          }

          let accessor = null;
          try {
            switch (property.type) {
              case "string":   accessor = vmi.string(propertyPath);   break;
              case "number":   accessor = vmi.number(propertyPath);   break;
              case "boolean":  accessor = vmi.boolean(propertyPath);  break;
              case "trigger":  accessor = vmi.trigger(propertyPath);  break;
              case "color":    accessor = vmi.color(propertyPath);    break;
              case "image":    accessor = vmi.image(propertyPath);    break;
              case "enumType": accessor = vmi.enum(propertyPath);     break;
              case "artboard": accessor = vmi.artboard(propertyPath); break;
              case "list":     accessor = vmi.list(propertyPath);     break;
              default: break;
            }
          } catch (err) {
            console.error("Error mapping: " + propertyPath + " " + err.message);
          }

          if (accessor) {
            const propKey = propertyPath.replace(/\//g, "_");
            const propData = { type: property.type, accessor, path: propertyPath };
            if (property.type === "enumType" && accessor.values) propData.enumValues = accessor.values;
            if (property.type === "list") {
              propData.addedInstances = [];
              if ((accessor.length ?? 0) > 0) {
                try {
                  const firstItem = accessor.instanceAt(0);
                  const detected = findVMNameForInstance(firstItem);
                  if (detected) propData.itemVMName = detected;
                } catch {}
              }
            }
            props[propKey] = propData;
          }
        }
      }

      processViewModel(defaultVM, "");
      widgetState._findVMNameForInstance = findVMNameForInstance;
      return { props, vmMetadata, defaultVMName };
    }

    // =========================================================================
    // Property handlers — type-specific update logic
    // =========================================================================

    function handleScalarUpdate(prop, value) {
      if (value !== prop.accessor.value) prop.accessor.value = value;
    }

    function handleImageUpdate(name, prop, imageUrl) {
      if (!imageUrl || imageUrl === "") return;
      if (imageUrl.startsWith("//")) imageUrl = "https:" + imageUrl;
      else if (!imageUrl.startsWith("http://") && !imageUrl.startsWith("https://") && !imageUrl.startsWith("data:")) imageUrl = "https://" + imageUrl;
      if (prop.currentImageUrl === imageUrl) return;
      prop.currentImageUrl = imageUrl;
      (async () => {
        try {
          const res = await fetch(imageUrl);
          const image = await window.rive.decodeImage(new Uint8Array(await res.arrayBuffer()));
          prop.accessor.value = image;
        } catch (error) { console.error(`Failed to load image ${name}:`, error); }
      })();
    }

    function handleEnumUpdate(prop, selectedIndex) {
      const index = parseInt(selectedIndex);
      if (prop.enumValues[index]) {
        const enumValueName = prop.enumValues[index];
        if (prop.accessor.value !== enumValueName) prop.accessor.value = enumValueName;
      }
    }

    function handleArtboardUpdate(prop, selectedIndex) {
      const index = parseInt(selectedIndex);
      const file = widgetState.r?.file;
      if (file && index >= 0 && index < file.artboardCount()) {
        const artboardObj = file.artboardByIndex(index);
        if (artboardObj && widgetState.fileUrl) {
          const artboardName = artboardObj.name;
          const riveFile = new rive.RiveFile({
            src: widgetState.fileUrl,
            onLoad: () => {
              try { const ab = riveFile.getArtboard(artboardName); if (ab) prop.accessor.value = ab; }
              catch (err) { console.error(`Failed to get artboard ${artboardName}:`, err); }
            },
          });
          riveFile.init();
        }
      }
    }

    function handleColorUpdate(prop, colorData) {
      if (typeof colorData === "string" && colorData.startsWith("#")) {
        const hex = colorData.replace("#", "");
        prop.accessor.rgba(
          parseInt(hex.substring(0, 2), 16), parseInt(hex.substring(2, 4), 16),
          parseInt(hex.substring(4, 6), 16), hex.length === 8 ? parseInt(hex.substring(6, 8), 16) : 255
        );
      } else if (colorData && typeof colorData === "object" && "r" in colorData) {
        prop.accessor.rgba(
          Math.round(colorData.r), Math.round(colorData.g), Math.round(colorData.b),
          colorData.a !== undefined ? Math.round(colorData.a * 255) : 255
        );
      }
    }

    function handleListUpdate(prop, rawData) {
      let items;
      try {
        const parsed = typeof rawData === 'string' ? JSON.parse(rawData) : rawData;
        items = Array.isArray(parsed) ? parsed : [parsed];
      } catch { return; }

      const vmi = widgetState.r.viewModelInstance;
      if (!vmi) return;
      const listAcc = vmi.list(prop.path) ?? prop.accessor;
      for (let i = (listAcc.length ?? 0) - 1; i >= 0; i--) { try { listAcc.removeInstanceAt(i); } catch {} }

      prop.addedInstances = [];
      for (let i = 0; i < items.length; i++) {
        const item = items[i];
        const vmName = item._vm ?? prop.itemVMName;
        if (!vmName) continue;
        let vm, inst;
        try { vm = widgetState.r.viewModelByName(vmName); } catch {}
        try { inst = vm?.instance(); } catch {}
        if (!inst) continue;
        applyPropsToInstance(inst, item);
        try {
          listAcc.addInstance(inst);
          prop.addedInstances.push(inst);
          applyPropsToInstance(listAcc.instanceAt(i), item);
        } catch {}
      }
    }

    // =========================================================================
    // UI Generator — build dynamic Singular UI model
    // =========================================================================

    function getAvailableArtboards() {
      const artboards = [];
      const file = widgetState.r?.file;
      if (!file) return artboards;
      const count = file.artboardCount();
      for (let i = 0; i < count; i++) {
        const ab = file.artboardByIndex(i);
        if (ab) artboards.push(ab.name);
      }
      return artboards;
    }

    function getCurrentArtboardIndex(availableArtboards) {
      const file = widgetState.r?.file;
      if (!file) return 0;
      const defaultArtboard = file.defaultArtboard();
      const defaultName = defaultArtboard ? defaultArtboard.name : null;
      for (let i = 0; i < availableArtboards.length; i++) {
        if (availableArtboards[i] === widgetState.artboardName) return i;
        if (!widgetState.artboardName && availableArtboards[i] === defaultName) return i;
      }
      return 0;
    }

    function addArtboardField(fields, artboards, currentIndex) {
      if (artboards.length === 0) return;
      fields.push({
        id: "riveartboard", type: "selection", title: "Artboard",
        defaultValue: currentIndex.toString(),
        selections: artboards.map((name, i) => ({ id: i.toString(), title: name })),
      });
    }

    function addStateMachineField(fields) {
      const names = widgetState.r?.stateMachineNames;
      if (!names || names.length === 0) return;
      fields.push({
        id: "rivestatemachineselect", type: "selection", title: "State Machine",
        defaultValue: (widgetState.stateMachineIndex || 0).toString(),
        selections: names.map((name, i) => ({ id: i.toString(), title: name })),
      });
    }

    function resolveGroupInfo(name) {
      let viewModelName = widgetState.defaultVMName || "Main";
      let parentPropertyName = null;
      let groupKey = viewModelName;

      if (name.includes("_") && widgetState.vmMetadata) {
        const parts = name.split("_");
        const pathPrefix = parts[0];
        if (widgetState.vmMetadata[pathPrefix]) {
          viewModelName = widgetState.vmMetadata[pathPrefix].vmName;
          parentPropertyName = widgetState.vmMetadata[pathPrefix].parentProp;
          groupKey = pathPrefix;
        } else {
          parts.pop();
          viewModelName = parts.join(" ");
          groupKey = viewModelName;
        }
      }
      return { groupKey, viewModelName, parentPropertyName };
    }

    function buildArtboardSelections(prop, availableArtboards) {
      let selectedId = "0", defaultValue = "0", selections;
      if (availableArtboards.length > 0) {
        const currentArtboardName = prop.accessor.value;
        const filtered = availableArtboards
          .map((artboardName, originalIndex) => ({ artboardName, originalIndex }))
          .filter(item => item.artboardName !== widgetState.artboardName);
        if (filtered.length > 0) {
          selections = filtered.map(item => {
            if (item.artboardName === currentArtboardName) selectedId = item.originalIndex.toString();
            return { id: item.originalIndex.toString(), title: item.artboardName };
          });
          defaultValue = selectedId;
        }
      }
      return { defaultValue, selections };
    }

    function buildListDefaultValue(prop) {
      const items = [];
      for (let i = 0; i < (prop.accessor.length ?? 0); i++) {
        try {
          const item = prop.accessor.instanceAt(i);
          if (item) {
            const vmName = widgetState._findVMNameForInstance?.(item) ?? prop.itemVMName;
            if (vmName && !prop.itemVMName) prop.itemVMName = vmName;
            items.push({ ...readInstanceProperties(item) });
          }
        } catch {}
      }
      return items.length > 0 ? JSON.stringify(items, null, 2) : "[]";
    }

    function buildFieldForProperty(name, displayName, prop, availableArtboards) {
      let fieldType = prop.type, defaultValue = "", selections;

      switch (prop.type) {
        case "trigger":  fieldType = "button"; break;
        case "string":   fieldType = "text";     defaultValue = prop.accessor.value ?? ""; break;
        case "number":   fieldType = "number";   defaultValue = prop.accessor.value ?? 0; break;
        case "boolean":  fieldType = "checkbox"; defaultValue = prop.accessor.value ?? false; break;
        case "image":    fieldType = "image"; break;
        case "color":    defaultValue = riveColorValueToRGBA(prop.accessor.value); break;
        case "enumType":
          fieldType = "selection"; defaultValue = (prop.accessor.value ?? 0).toString();
          if (prop.enumValues?.length) selections = prop.enumValues.map((v, i) => ({ id: i.toString(), title: v }));
          break;
        case "artboard":
          fieldType = "selection";
          ({ defaultValue, selections } = buildArtboardSelections(prop, availableArtboards));
          break;
        case "list":
          fieldType = "json"; defaultValue = buildListDefaultValue(prop);
          break;
        default: break;
      }

      const field = { id: toAlphanumericId(name), type: fieldType, title: displayName, defaultValue };
      if (fieldType === "number") field.step = "0.1";
      if (fieldType === "json") { field.width = "350"; field.height = "200"; }
      if (selections) field.selections = selections;
      return field;
    }

    function buildGroups(availableArtboards, groupedProperties, viewModelParentInfo) {
      const groups = [];

      if (availableArtboards.length > 0) {
        const childIds = ["riveartboard"];
        if (widgetState.r?.stateMachineNames?.length > 0) childIds.push("rivestatemachineselect");
        groups.push({ id: "artboardgroup", title: "Artboard Selection", width: "double", toolTip: "Select the artboard to display", childIds });
      }

      for (const [groupKey, childIds] of Object.entries(groupedProperties)) {
        const groupInfo = viewModelParentInfo[groupKey];
        let groupTitle = groupKey, vmName = groupKey;

        if (groupInfo?.parentProp) {
          vmName = groupInfo.vmName;
          const cleanParentProp = groupInfo.parentProp.replace(/[^a-zA-Z0-9]/g, "").toLowerCase();
          if (widgetState.vmMetadata?.[groupInfo.parentProp]) {
            const parentVMName = widgetState.vmMetadata[groupInfo.parentProp].parentVMName || "Main";
            groupTitle = `${parentVMName} (${cleanParentProp}: ${vmName})`;
          } else {
            groupTitle = `${vmName} - ${cleanParentProp}`;
          }
        } else if (groupInfo?.vmName) {
          vmName = groupInfo.vmName;
          groupTitle = vmName;
        }

        groups.push({ id: toAlphanumericId(groupKey) + "group", title: groupTitle, width: "double", toolTip: `Properties from ${vmName}`, childIds });
      }
      return groups;
    }

    function generateUIModel() {
      const fields = [];
      const groupedProperties = {};
      const viewModelParentInfo = {};

      const availableArtboards = getAvailableArtboards();
      const currentArtboardIndex = getCurrentArtboardIndex(availableArtboards);

      addArtboardField(fields, availableArtboards, currentArtboardIndex);
      addStateMachineField(fields);

      // Dynamic property fields
      for (const [name, prop] of Object.entries(widgetState.riveProps)) {
        if (name.includes("__")) continue;
        const displayName = name.includes("_") ? name.split("_").pop() : name;
        const { groupKey, viewModelName, parentPropertyName } = resolveGroupInfo(name);
        if (!viewModelParentInfo[groupKey]) viewModelParentInfo[groupKey] = { vmName: viewModelName, parentProp: parentPropertyName };
        const field = buildFieldForProperty(name, displayName, prop, availableArtboards);
        if (field) {
          fields.push(field);
          if (!groupedProperties[groupKey]) groupedProperties[groupKey] = [];
          groupedProperties[groupKey].push(field.id);
        }
      }

      const groups = buildGroups(availableArtboards, groupedProperties, viewModelParentInfo);
      const uiModel = { fields, groups };
      console.log("Sending UI Model to Singular:", JSON.stringify(uiModel, null, 2));
      SingularWidget.setCustomWidgetUI(uiModel);
    }

    // =========================================================================
    // Rive lifecycle
    // =========================================================================

    function initializeRive(fileUrl) {
      widgetState.riveReady = false;
      const loadGen = (widgetState._loadGen = (widgetState._loadGen ?? 0) + 1);

      // Watchdog: if onLoad never fires within 5s, retry once
      const watchdog = setTimeout(() => {
        if (!widgetState.riveReady && widgetState._loadGen === loadGen) {
          console.warn("[Rive] onLoad watchdog triggered — retrying initializeRive");
          reloadRive(widgetState.fileUrl);
        }
      }, 5000);

      const riveConfig = {
        src: fileUrl,
        canvas: document.getElementById("canvas"),
        autoplay: true,
        autoBind: true,
        ...(widgetState.runtime === "webgl2" ? { useOffscreenRenderer: true } : {}),
        layout: new rive.Layout({ fit: rive.Fit[widgetState.layoutFit] }),
        enableFPSCounter: true,

        onLoad: () => {
          clearTimeout(watchdog);
          resizeCanvas();

          const vmData = getAllViewModelProperties(widgetState.r);
          widgetState.riveProps = vmData.props;
          widgetState.vmMetadata = vmData.vmMetadata;
          widgetState.defaultVMName = vmData.defaultVMName;

          generateUIModel();
          ensureFPSCounter(widgetState.r);
          widgetState.riveReady = true;

          if (widgetState.pendingInitialValues) {
            const initialValues = widgetState.pendingInitialValues;
            widgetState.pendingInitialValues = null;
            onSingularValue(initialValues);
          }

          setTimeout(() => { document.getElementById("canvas").classList.add("ready"); }, 400);
        },

        onLoadError: (err) => { console.error("[Rive Error] Rive load error:", err); },
      };

      if (widgetState.artboardName) riveConfig.artboard = widgetState.artboardName;
      if (widgetState.stateMachineName) riveConfig.stateMachines = widgetState.stateMachineName;
      widgetState.r = new rive.Rive(riveConfig);
    }

    function reloadRive(fileUrl) {
      document.getElementById("canvas").classList.remove("ready");
      if (widgetState.r) { try { widgetState.r.cleanup(); } catch {} widgetState.r = null; }
      initializeRive(fileUrl);
    }

    // =========================================================================
    // Singular event handlers
    // =========================================================================

    function updateDynamicProperties(json) {
      for (const [name, prop] of Object.entries(widgetState.riveProps)) {
        const id = toAlphanumericId(name);
        if (json[id] === undefined) continue;
        try {
          const value = json[id];
          switch (prop.type) {
            case "string": case "number": case "boolean": handleScalarUpdate(prop, value); break;
            case "image":    handleImageUpdate(name, prop, value); break;
            case "enumType": handleEnumUpdate(prop, value); break;
            case "artboard": handleArtboardUpdate(prop, value); break;
            case "color":    handleColorUpdate(prop, value); break;
            case "list":     handleListUpdate(prop, value); break;
          }
        } catch (err) {
          console.error(`Failed to update '${name}' (id: ${id}):`, err.message);
        }
      }
    }

    async function onSingularValue(json) {
      widgetState.pendingInitialValues = widgetState.pendingInitialValues
        ? { ...widgetState.pendingInitialValues, ...json } : json;

      // Runtime change
      if (json.rive_renderer !== undefined) {
        const desiredRuntime = json.rive_renderer !== false ? "webgl2" : "canvas";
        const needLoad = !widgetState.runtime || widgetState.runtime !== desiredRuntime || !window.rive;
        if (needLoad) {
          try { await toggleRiveRuntime(desiredRuntime); }
          catch (e) { console.error("Failed to load desired runtime:", desiredRuntime, e); return; }
        }
      }

      // File URL change
      if (json.rive_file_url !== undefined) {
        if (typeof json.rive_file_url === "string" && json.rive_file_url.endsWith(".riv")) {
          const newFileUrl = json.rive_file_url;
          if (newFileUrl !== widgetState.fileUrl) {
            widgetState.fileUrl = newFileUrl;
            if (json.rive_layout !== undefined) widgetState.layoutFit = widgetState.layoutOptions[parseInt(json.rive_layout, 10)] || "Contain";
            widgetState.artboardName = "";
            widgetState.stateMachineName = "";
            widgetState.stateMachineIndex = 0;
            if (!widgetState.r) initializeRive(newFileUrl); else reloadRive(newFileUrl);
            return;
          }
        } else { return; }
      }

      // Initialize if URL is ready but no instance
      if (!widgetState.r && widgetState.fileUrl && widgetState.fileUrl.endsWith(".riv")) {
        initializeRive(widgetState.fileUrl);
        return;
      }

      // FPS toggle
      if (json.show_fps !== undefined) {
        widgetState.displayFpsCounter = json.show_fps === true;
        if (widgetState.r) ensureFPSCounter(widgetState.r);
      }

      // Layout change
      if (json.rive_layout !== undefined) {
        const newLayout = widgetState.layoutOptions[parseInt(json.rive_layout, 10)] || "Contain";
        if (newLayout !== widgetState.layoutFit) {
          widgetState.layoutFit = newLayout;
          if (widgetState.r && widgetState.fileUrl) { reloadRive(widgetState.fileUrl); return; }
        }
      }

      // Artboard change
      if (json.riveartboard !== undefined && widgetState.r) {
        const artboardIndex = parseInt(json.riveartboard);
        const file = widgetState.r?.file;
        if (file && artboardIndex >= 0 && artboardIndex < file.artboardCount()) {
          const artboard = file.artboardByIndex(artboardIndex);
          if (artboard) {
            const newArtboard = typeof artboard.name === "function" ? artboard.name() : artboard.name;
            if (newArtboard !== widgetState.artboardName) {
              widgetState.artboardName = newArtboard;
              widgetState.stateMachineName = "";
              widgetState.stateMachineIndex = 0;
              if (widgetState.fileUrl) { reloadRive(widgetState.fileUrl); return; }
            }
          }
        }
      }

      // State machine change
      if (json.rivestatemachineselect !== undefined && widgetState.r) {
        const smIndex = parseInt(json.rivestatemachineselect);
        if (!isNaN(smIndex) && smIndex >= 0) {
          widgetState.stateMachineIndex = smIndex;
          const newName = widgetState.r.stateMachineNames?.[smIndex] ?? "";
          if (newName !== widgetState.stateMachineName) {
            widgetState.stateMachineName = newName;
            if (widgetState.fileUrl) { reloadRive(widgetState.fileUrl); return; }
          }
        }
      }

      if (!widgetState.r || !widgetState.riveReady) return;
      updateDynamicProperties(json);
    }

    function onSingularButtonClicked(action) {
      for (const [name, prop] of Object.entries(widgetState.riveProps)) {
        if (toAlphanumericId(name) === action && prop?.type === "trigger") {
          prop.accessor.trigger();
          return;
        }
      }
    }

    // =========================================================================
    // Entry point
    // =========================================================================

    SingularWidget.init({
      onInit: async (json) => {
        widgetState.pendingInitialValues = json;
        const layoutIndex = parseInt(json.rive_layout, 10);
        widgetState.layoutFit = widgetState.layoutOptions?.[layoutIndex] || widgetState.layoutFit || "Contain";
        if (json.show_fps !== undefined) widgetState.displayFpsCounter = json.show_fps;
        const desiredRuntime = json.rive_renderer ? "webgl2" : "canvas";
        try {
          await toggleRiveRuntime(desiredRuntime);
        } catch (e) {
          console.warn("[Rive] Failed to load", desiredRuntime, "— falling back to canvas:", e);
          try { await toggleRiveRuntime("canvas"); } catch {}
        }
        if (typeof json.rive_file_url === "string" && json.rive_file_url.endsWith(".riv")) {
          widgetState.fileUrl = json.rive_file_url;
          initializeRive(json.rive_file_url);
        }
      },
      onValue: onSingularValue,
      onButtonClicked: onSingularButtonClicked,
    });
    </script>
  </body>
</html>
