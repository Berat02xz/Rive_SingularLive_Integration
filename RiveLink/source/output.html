<!doctype html>
<html>
  <head>
    <style>
      html,
      body {
        background: none;
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        overflow: hidden;
      }
      #canvas {
        display: block;
        width: 100%;
        height: 100%;
        opacity: 0;
      }
      #canvas.ready {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <div id="rive-fps-counter" style="display: none; position: absolute; top: 12px; left: 12px; background-color: black; color: white; font: 20px Gotham, sans-serif; border-radius: 8px; padding: 8px 12px; z-index: 1000;">FPS: --</div>

    <script src="https://beta.singular.live/libs/singularwidget/1.0.4/singularwidget.js"></script>

    <script>
    // =========================================================================
    // States and configuration
    // =========================================================================

    const widgetState = {
      riveProps: {},
      r: null,
      riveReady: false,
      artboardName: "",
      stateMachineName: "",
      layoutFit: "",
      fileUrl: "",
      runtime: "",
      stateMachineIndex: 0,
      displayFpsCounter: false,
      pendingInitialValues: null,
      vmMetadata: {},
      defaultVMName: "",
      _findVMNameForInstance: null,
      referencedFontAssets: {},  // fieldId → { asset, assetName }
      metricFontData: {},        // fieldId → { family, weight, subset }

      layoutOptions: [
        "Contain", "Cover", "Fill", "FitWidth", "FitHeight", "ScaleDown", "Layout", "None",
      ],
      runtimeSources: {
        webgl2: "https://unpkg.com/@rive-app/webgl2@2.37.8/rive.js",
        canvas: "https://unpkg.com/@rive-app/canvas@2.37.8/rive.js",
      },
    };

    // =========================================================================
    // Utilities
    // =========================================================================

    function toAlphanumericId(str) {
      return str.replace(/[^a-zA-Z0-9]/g, "");
    }

    function riveColorValueToRGBA(colorValue) {
      return {
        r: (colorValue >> 16) & 0xff,
        g: (colorValue >> 8) & 0xff,
        b: colorValue & 0xff,
        a: ((colorValue >> 24) & 0xff) / 255,
      };
    }

    const imageUrlHistory = {};
    const instanceImageUrls = new WeakMap();
    function normalizeImageUrl(url) {
      if (url.startsWith("//")) return "https:" + url;
      if (!/^(https?:|data:)/.test(url)) return "https://" + url;
      return url;
    }
    async function decodeImageFromUrl(url) {
      const res = await fetch(url);
      return window.rive.decodeImage(new Uint8Array(await res.arrayBuffer()));
    }

    // =========================================================================
    // Font loading — Google Fonts TTF via GitHub raw → Rive decodeFont / setFont
    // =========================================================================

    const FONT_FALLBACK_URL = "https://cdn.rive.app/runtime/flutter/inter.ttf";

    // Weight number → static TTF style-name suffix used in the Google Fonts GitHub repo
    const WEIGHT_TO_STYLE_NAME = {
      "100": "Thin", "200": "ExtraLight", "300": "Light",
      "400": "Regular", "500": "Medium", "600": "SemiBold",
      "700": "Bold", "800": "ExtraBold", "900": "Black",
    };

    function fontAssetFieldId(assetName) {
      const base = assetName.replace(/\.[^.]+$/, "");
      return "rivefont" + base.replace(/[^a-zA-Z0-9]/g, "");
    }

    function parseFontFamilyFromAsset(assetName) {
      let name = assetName.replace(/\.[^.]+$/, "").replace(/\[.*?\]/g, "").trim();
      const lastDash = name.lastIndexOf("-");
      const familyPart = lastDash > 0 ? name.substring(0, lastDash) : name;
      return familyPart.replace(/([A-Z])/g, " $1").trim().replace(/\s+/g, " ");
    }

    const GFKey = "AIzaSyBMre41OpN9ISDJQaZFMp6YmyhlUJV8MfE";

    async function fetchGoogleFontBytes(family, weight) {
      const weightStr = String(weight);

      // Method 1: Google Fonts API
      try {
        const apiUrl = `https://www.googleapis.com/webfonts/v1/webfonts?key=${GFKey}&family=${encodeURIComponent(family)}`;
        const res = await fetch(apiUrl);
        if (res.ok) {
          const data = await res.json();
          const item = data.items && data.items[0];
          if (item && item.files) {
            const weightKey = weightStr === "400" ? "regular" : weightStr;
            const fontUrl = item.files[weightKey] || item.files["regular"];
            if (fontUrl) {
              const fontRes = await fetch(fontUrl);
              if (fontRes.ok) {
                return new Uint8Array(await fontRes.arrayBuffer());
              }
            }
          }
        }
      } catch { }

      // Method 2: GitHub raw fallback
      const styleName = WEIGHT_TO_STYLE_NAME[weightStr] || "Regular";
      const familyCamel = family.replace(/\s+/g, "");
      const fontId = family.toLowerCase().replace(/\s+/g, "");
      const BASE = "https://raw.githubusercontent.com/google/fonts/main";
      const candidates = ["ofl", "apache", "ufl"].flatMap((lic) => [
        `${BASE}/${lic}/${fontId}/${familyCamel}-${styleName}.ttf`,
        `${BASE}/${lic}/${fontId}/static/${familyCamel}-${styleName}.ttf`,
      ]);

      for (const url of candidates) {
        try {
          const res = await fetch(url);
          if (res.ok) {
            return new Uint8Array(await res.arrayBuffer());
          }
        } catch { /* try next candidate */ }
      }

      throw new Error(`No TTF found for "${family}" wght ${weightStr} via API or GitHub`);
    }

    async function fetchAndApplyFont(fieldId) {
      const fontInfo = widgetState.referencedFontAssets[fieldId];
      if (!fontInfo || !fontInfo.asset) return;

      const metricData = widgetState.metricFontData[fieldId];
      if (!metricData || !metricData.family) return;

      const { family, weight = "400" } = metricData;
      const capturedAsset = fontInfo.asset;

      let bytes;
      try {
        bytes = await fetchGoogleFontBytes(family, weight);
      } catch {
        try {
          bytes = new Uint8Array(
            await fetch(FONT_FALLBACK_URL).then((r) => r.arrayBuffer())
          );
        } catch {
          return;
        }
      }

      let decoded = null;
      try {
        decoded = await window.rive.decodeFont(bytes);
      } catch {
        return;
      }

      if (!decoded) return;
      try {
        if (!widgetState.referencedFontAssets[fieldId] || widgetState.referencedFontAssets[fieldId].asset !== capturedAsset) {
          return;
        }
        capturedAsset.setFont(decoded);
      } catch { } finally {
        decoded.unref();
      }
    }

    // =========================================================================
    // Runtime — WebGL2 / Canvas toggle
    // =========================================================================

    function waitForRiveGlobal() {
      return new Promise((resolve, reject) => {
        const start = Date.now();
        const timer = setInterval(() => {
          if (window.rive && typeof window.rive.Rive === 'function') {
            clearInterval(timer);
            resolve();
          } else if (Date.now() - start > 5000) {
            clearInterval(timer);
            reject(new Error('Timed out waiting for Rive global'));
          }
        }, 50);
      });
    }

    async function toggleRiveRuntime(desiredRuntime) {
      // Serialize: if another switch is already in flight, wait for it to finish
      // before checking state. This prevents two concurrent toggles from racing
      // (e.g. onInit and onSingularValue both calling this simultaneously).
      while (widgetState._runtimeSwitching) {
        await widgetState._runtimeSwitching;
      }

      if (widgetState.runtime === desiredRuntime && window.rive) {
        return;
      }

      let switchResolve;
      widgetState._runtimeSwitching = new Promise(r => { switchResolve = r; });

      try {
        const existing = document.getElementById("rive-runtime-script");
        try {
          if (existing) existing.remove();
          if (widgetState.r) widgetState.r.cleanup();
          delete window.rive;
        } catch {}

        const script = document.createElement("script");
        script.id = "rive-runtime-script";
        script.src = widgetState.runtimeSources[desiredRuntime];
        document.body.prepend(script);

        await new Promise((resolve, reject) => {
          script.onload = async () => {
            try {
              await waitForRiveGlobal();
              widgetState.runtime = desiredRuntime;
              resolve();
            } catch (e) { reject(e); }
          };
          script.onerror = () => reject(new Error(`Failed to load ${desiredRuntime}`));
        });
      } finally {
        widgetState._runtimeSwitching = null;
        switchResolve();
      }
    }

    // =========================================================================
    // Canvas & FPS
    // =========================================================================

    function resizeCanvas() {
      const canvas = document.getElementById("canvas");
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      if (widgetState.r) widgetState.r.resizeDrawingSurfaceToCanvas();
    }

    window.addEventListener("resize", resizeCanvas);

    function ensureFPSCounter(instance) {
      const overlay = document.getElementById("rive-fps-counter");
      if (widgetState.displayFpsCounter) {
        overlay.style.display = "block";
        try {
          instance.enableFPSCounter((fps) => {
            if (widgetState.displayFpsCounter) {
              overlay.textContent = `FPS: ${Math.round(fps)}`;
            }
          });
        } catch {}
      } else {
        overlay.style.display = "none";
      }
    }

    // =========================================================================
    // ViewModel — read / write / discover
    // =========================================================================

    function readInstanceProperties(instance) {
      const obj = {};
      for (const _p of instance.properties) {
        // "__" marks internal convention slots (Save__/Update__ etc.); never expose
        // them in the generated default JSON shown in Singular.
        if (_p.name.includes("__")) continue;
        try {
          if (_p.type === "string")       obj[_p.name] = instance.string(_p.name) != null ? instance.string(_p.name).value : "";
          else if (_p.type === "number")  obj[_p.name] = instance.number(_p.name) != null ? instance.number(_p.name).value : 0;
          else if (_p.type === "boolean") obj[_p.name] = instance.boolean(_p.name) != null ? instance.boolean(_p.name).value : false;
          else if (_p.type === "color") {
            const colorAcc = instance.color(_p.name);
            if (colorAcc != null) {
              const rgba = riveColorValueToRGBA(colorAcc.value);
              const r = Math.round(rgba.r).toString(16).padStart(2, "0");
              const g = Math.round(rgba.g).toString(16).padStart(2, "0");
              const b = Math.round(rgba.b).toString(16).padStart(2, "0");
              obj[_p.name] = `#${r}${g}${b}`;
            }
          }
          else if (_p.type === "image") { obj[_p.name] = ""; }
        } catch {}
      }
      return obj;
    }

    function applyPropsToInstance(inst, itemData) {
      for (const key of Object.keys(itemData)) {
        // Underscore-prefixed fields are internal helpers (never written to the instance).
        if (key.startsWith('_')) continue;
        const val = itemData[key];
        try {
          if (typeof val === 'boolean') {
            const a = inst.boolean(key); if (a) a.value = val;
          } else if (typeof val === 'number') {
            const a = inst.number(key); if (a) a.value = val;
          } else if (typeof val === 'string') {
            const strAcc = inst.string(key);
            if (strAcc) { strAcc.value = val; continue; }
            // Hex color string (#rrggbb or #rrggbbaa)
            if (val.startsWith('#')) {
              const colorAcc = inst.color(key);
              if (colorAcc) {
                const hex = val.replace('#', '');
                colorAcc.rgba(
                  parseInt(hex.substring(0, 2), 16), parseInt(hex.substring(2, 4), 16),
                  parseInt(hex.substring(4, 6), 16), hex.length === 8 ? parseInt(hex.substring(6, 8), 16) : 255
                );
                continue;
              }
            }
            // Image URL
            if (val) applyImageProperty(inst, key, val, itemData);
          } else if (val && typeof val === 'object' && 'r' in val) {
            // RGBA color object
            const colorAcc = inst.color(key);
            if (colorAcc) colorAcc.rgba(
              Math.round(val.r), Math.round(val.g), Math.round(val.b),
              val.a !== undefined ? Math.round(val.a * 255) : 255
            );
          }
        } catch {}
      }
    }

    // Image before/after pair: new picture -> "<key>", previous -> "<key>__",
    // then fire the "<key>Update__" trigger so the item state machine can crossfade.
    function applyImageProperty(inst, key, rawUrl, itemData) {
      const imgAcc = inst.image(key);
      if (!imgAcc) return;
      const url = normalizeImageUrl(rawUrl);

      let seen = instanceImageUrls.get(inst);
      if (!seen) { seen = {}; instanceImageUrls.set(inst, seen); }
      if (seen[key] === url) return;

      const itemKey = resolveItemKey(itemData);
      const histKey = itemKey ? itemKey + "|" + key : null;
      const prevUrl = histKey ? imageUrlHistory[histKey] : seen[key];
      const isChange = prevUrl !== undefined && prevUrl !== url;

      (async () => {
        try {
          const beforeAcc = inst.image(key + "__");
          const trigger = inst.trigger ? inst.trigger(key + "Update__") : null;
          if (isChange) {
            const fetchOld = beforeAcc ? decodeImageFromUrl(prevUrl).catch(() => null) : Promise.resolve(null);
            const [oldImage, newImage] = await Promise.all([fetchOld, decodeImageFromUrl(url)]);
            if (beforeAcc && oldImage) beforeAcc.value = oldImage;
            imgAcc.value = newImage;
            if (trigger && typeof trigger.trigger === "function") trigger.trigger();
          } else {
            const image = await decodeImageFromUrl(url);
            imgAcc.value = image;
            if (beforeAcc) beforeAcc.value = image;
          }
          seen[key] = url;
          if (histKey) imageUrlHistory[histKey] = url;
        } catch {}
      })();
    }

    function getAllViewModelProperties(riveInst) {
      const props = {};
      const vmMetadata = {};

      if (riveInst.viewModelCount === 0) return { props, vmMetadata, defaultVMName: "" };

      const _defaultVM = riveInst.defaultViewModel();
      let vmi = riveInst.viewModelInstance;
      let defaultVM = _defaultVM;

      if (!defaultVM) return { props, vmMetadata, defaultVMName: "" };

      const _autoHasList = defaultVM.properties.some(p => p.type === "list");
      if (!_autoHasList || !vmi) {
        let chosenVM = null;
        for (let _vi = 0; _vi < riveInst.viewModelCount; _vi++) {
          const _v = riveInst.viewModelByIndex(_vi);
          if (_v && _v.properties.some(p => p.type === "list")) { chosenVM = _v; break; }
        }
        if (!chosenVM) chosenVM = defaultVM;
        var _newInstDefault = chosenVM.defaultInstance(); const _newInst = _newInstDefault != null ? _newInstDefault : chosenVM.instance();
        if (_newInst) {
          riveInst.bindViewModelInstance(_newInst);
          vmi = _newInst;
          defaultVM = chosenVM;
        } else if (!vmi) {
          return { props, vmMetadata, defaultVMName: "" };
        }
      }

      const defaultVMName = defaultVM.name;
      const processedVMs = new Set();

      function findVMNameForInstance(instance) {
        if (!instance) return null;
        try {
          const instanceProps = instance.properties;
          for (let _vi = 0; _vi < riveInst.viewModelCount; _vi++) {
            const _vm = riveInst.viewModelByIndex(_vi);
            if (!_vm) continue;
            const _vmProps = _vm.properties;
            if (_vmProps.length !== instanceProps.length) continue;
            if (instanceProps.every(ip => _vmProps.find(vp => vp.name === ip.name && vp.type === ip.type))) return _vm.name;
          }
        } catch {}
        return null;
      }

      function processViewModel(vm, pathPrefix) {
        if (processedVMs.has(vm)) return;
        processedVMs.add(vm);

        for (const property of vm.properties) {
          const propertyPath = pathPrefix ? `${pathPrefix}/${property.name}` : property.name;

          if (property.type === "viewModel") {
            let matchedVM = null;
            for (let i = 0; i < riveInst.viewModelCount; i++) {
              const nestedVM = riveInst.viewModelByIndex(i);
              if (!nestedVM || processedVMs.has(nestedVM)) continue;
              if (nestedVM.name && property.name.includes(nestedVM.name)) { matchedVM = nestedVM; break; }
            }
            if (matchedVM) {
              vmMetadata[property.name] = { vmName: matchedVM.name, parentProp: property.name, parentVMName: vm.name };
              processViewModel(matchedVM, property.name);
            }
            continue;
          }

          let accessor = null;
          try {
            switch (property.type) {
              case "string":   accessor = vmi.string(propertyPath);   break;
              case "number":   accessor = vmi.number(propertyPath);   break;
              case "boolean":  accessor = vmi.boolean(propertyPath);  break;
              case "trigger":  accessor = vmi.trigger(propertyPath);  break;
              case "color":    accessor = vmi.color(propertyPath);    break;
              case "image":    accessor = vmi.image(propertyPath);    break;
              case "enumType": accessor = vmi.enum(propertyPath);     break;
              case "artboard": accessor = vmi.artboard(propertyPath); break;
              case "list":     accessor = vmi.list(propertyPath);     break;
              default: break;
            }
          } catch { }

          if (accessor) {
            const propKey = propertyPath.replace(/\//g, "_");
            const propData = { type: property.type, accessor, path: propertyPath };
            if (property.type === "enumType" && accessor.values) propData.enumValues = accessor.values;
            if (property.type === "list") {
              propData.addedInstances = [];
              if ((accessor.length != null ? accessor.length : 0) > 0) {
                try {
                  const firstItem = accessor.instanceAt(0);
                  const detected = findVMNameForInstance(firstItem);
                  if (detected) propData.itemVMName = detected;
                } catch {}
              }
            }
            props[propKey] = propData;
          }
        }
      }

      processViewModel(defaultVM, "");
      widgetState._findVMNameForInstance = findVMNameForInstance;
      return { props, vmMetadata, defaultVMName };
    }

    // =========================================================================
    // Property handlers — type-specific update logic
    // =========================================================================

    function handleScalarUpdate(prop, value) {
      if (value !== prop.accessor.value) prop.accessor.value = value;
    }

    function handleImageUpdate(name, prop, imageUrl) {
      if (!imageUrl || imageUrl === "") return;
      imageUrl = normalizeImageUrl(imageUrl);
      if (prop.currentImageUrl === imageUrl) return;
      prop.currentImageUrl = imageUrl;
      (async () => {
        try {
          prop.accessor.value = await decodeImageFromUrl(imageUrl);
        } catch {}
      })();
    }

    function handleEnumUpdate(prop, selectedIndex) {
      const index = parseInt(selectedIndex);
      if (prop.enumValues[index]) {
        const enumValueName = prop.enumValues[index];
        if (prop.accessor.value !== enumValueName) prop.accessor.value = enumValueName;
      }
    }

    function handleArtboardUpdate(prop, selectedIndex) {
      const index = parseInt(selectedIndex);
      const file = widgetState.r ? widgetState.r.file : undefined;
      if (file && index >= 0 && index < file.artboardCount()) {
        const artboardObj = file.artboardByIndex(index);
        if (artboardObj && widgetState.fileUrl) {
          const artboardName = artboardObj.name;
          const riveFile = new rive.RiveFile({
            src: widgetState.fileUrl,
            onLoad: () => {
              try { const ab = riveFile.getArtboard(artboardName); if (ab) prop.accessor.value = ab; }
              catch { }
            },
          });
          riveFile.init();
        }
      }
    }

    function handleColorUpdate(prop, colorData) {
      if (typeof colorData === "string" && colorData.startsWith("#")) {
        const hex = colorData.replace("#", "");
        prop.accessor.rgba(
          parseInt(hex.substring(0, 2), 16), parseInt(hex.substring(2, 4), 16),
          parseInt(hex.substring(4, 6), 16), hex.length === 8 ? parseInt(hex.substring(6, 8), 16) : 255
        );
      } else if (colorData && typeof colorData === "object" && "r" in colorData) {
        prop.accessor.rgba(
          Math.round(colorData.r), Math.round(colorData.g), Math.round(colorData.b),
          colorData.a !== undefined ? Math.round(colorData.a * 255) : 255
        );
      }
    }

    // Stable key for an item payload, used to match items to instances across reorders.
    function resolveItemKey(item) {
      if (!item || typeof item !== 'object') return null;
      const name = item.name != null ? String(item.name) : '';
      if (name) return 'n:' + name;
      const id = item.id != null ? String(item.id) : '';
      if (id) return 'i:' + id;
      return null;
    }

    // Same stable key, read from a live Rive instance.
    function resolveInstanceKey(inst) {
      if (!inst) return null;
      try { const a = inst.string('name'); if (a && a.value) return 'n:' + String(a.value); } catch {}
      try { const a = inst.string('id');   if (a && a.value) return 'i:' + String(a.value); } catch {}
      return null;
    }

    // Reorders live instances to match `items` via list.swap(). No-op unless every
    // item has a stable name/id key that matches its instance.
    function tryReorderInstancesToIncomingOrder(listAcc, items, instanceMap) {
      const length = listAcc.length != null ? listAcc.length : 0;
      if (length !== items.length || length < 2) return;

      const current = [];
      const positionByKey = new Map();
      for (let i = 0; i < length; i++) {
        let inst;
        try { inst = listAcc.instanceAt(i); } catch {}
        const key = resolveInstanceKey(inst);
        if (!inst || !key || positionByKey.has(key)) return;
        current[i] = inst;
        positionByKey.set(key, i);
      }

      const desiredKeys = items.map(resolveItemKey);
      if (desiredKeys.some(k => !k)) return;
      if (new Set(desiredKeys).size !== desiredKeys.length) return;
      if (!desiredKeys.every(k => positionByKey.has(k))) return;

      for (let i = 0; i < desiredKeys.length; i++) {
        const desiredKey = desiredKeys[i];
        const currentPos = positionByKey.get(desiredKey);
        if (currentPos === i) continue;

        const desiredInst = current[currentPos];
        const displacedInst = current[i];
        const displacedKey = resolveInstanceKey(displacedInst);

        try { listAcc.swap(i, currentPos); } catch { return; }

        current[i] = desiredInst;
        current[currentPos] = displacedInst;
        positionByKey.set(desiredKey, i);
        if (displacedKey) positionByKey.set(displacedKey, currentPos);
      }

      instanceMap.clear();
      for (let i = 0; i < length; i++) {
        if (current[i]) instanceMap.set(i, current[i]);
      }
    }

    function handleListUpdate(prop, rawData) {
      const rawStr = typeof rawData === 'string' ? rawData : JSON.stringify(rawData);

      let items;
      try {
        const parsed = typeof rawData === 'string' ? JSON.parse(rawData) : rawData;
        items = Array.isArray(parsed) ? parsed : [parsed];
      } catch (error) {
        console.warn("[RiveWidget:list] failed to parse payload", { path: prop.path, error });
        return;
      }

      const vmi = widgetState.r.viewModelInstance;
      if (!vmi) return;
      var _listResult = vmi.list(prop.path); const listAcc = _listResult != null ? _listResult : prop.accessor;

      // instanceMap: logical-index → instance, so writes hit the right instance even if the sort script reorders mid-loop.
      if (!prop.instanceMap) prop.instanceMap = new Map();

      let currentLength = listAcc.length != null ? listAcc.length : 0;
      const newLength = items.length;
      const dataUnchanged = prop._lastListData === rawStr;

      // First update: clear authored/default instances so items re-add in Singular's order.
      if (prop.instanceMap.size === 0 && currentLength > 0) {
        for (let i = currentLength - 1; i >= 0; i--) {
          try { listAcc.removeInstanceAt(i); } catch {}
        }
        currentLength = 0;
      }

      if (!dataUnchanged && currentLength > newLength) {
        let oldItems = [];
        if (prop._lastListData) {
          try { oldItems = JSON.parse(prop._lastListData); } catch {}
        }

        let removedByKey = false;
        if (oldItems.length === currentLength) {
          const newKeySet = new Set();
          for (const item of items) { const k = resolveItemKey(item); if (k) newKeySet.add(k); }

          const toRemove = [];
          for (let i = 0; i < oldItems.length; i++) {
            const key = resolveItemKey(oldItems[i]);
            if (key && !newKeySet.has(key)) toRemove.push({ logicalIdx: i, key });
          }

          if (toRemove.length > 0 && toRemove.length === currentLength - newLength) {
            const toRemoveWithPos = [];
            for (const { logicalIdx, key } of toRemove) {
              let rivePos = -1;
              const rlen = listAcc.length != null ? listAcc.length : 0;
              for (let i = 0; i < rlen; i++) {
                try { if (resolveInstanceKey(listAcc.instanceAt(i)) === key) { rivePos = i; break; } } catch {}
              }
              toRemoveWithPos.push({ logicalIdx, rivePos });
            }

            toRemoveWithPos.sort((a, b) => b.rivePos - a.rivePos);
            for (const { rivePos } of toRemoveWithPos) {
              if (rivePos >= 0) try { listAcc.removeInstanceAt(rivePos); } catch {}
            }

            const removedSet = new Set(toRemoveWithPos.map(x => x.logicalIdx));
            const newMap = new Map();
            let newIdx = 0;
            for (let oldIdx = 0; oldIdx < currentLength; oldIdx++) {
              if (!removedSet.has(oldIdx)) {
                const inst = prop.instanceMap.get(oldIdx);
                if (inst !== undefined) newMap.set(newIdx, inst);
                newIdx++;
              }
            }
            prop.instanceMap = newMap;
            currentLength = newLength;
            removedByKey = true;
          }
        }

        if (!removedByKey) {
          for (let i = currentLength - 1; i >= newLength; i--) {
            try { listAcc.removeInstanceAt(i); } catch {}
            prop.instanceMap.delete(i);
          }
          currentLength = newLength;
        }
      }

      // Reorder to incoming order even when data is unchanged (restores the no-sort
      // order after leaving a stat-sort mode). No-op if already ordered.
      if (prop.instanceMap.size > 0 && currentLength === newLength && currentLength > 1) {
        tryReorderInstancesToIncomingOrder(listAcc, items, prop.instanceMap);
      }

      if (dataUnchanged) return;
      prop._lastListData = rawStr;

      // Snapshot instance refs so sort-induced reorders mid-loop don't misalign writes.
      const existingInstances = [];
      for (let i = 0; i < currentLength; i++) {
        try { existingInstances[i] = listAcc.instanceAt(i); } catch {}
      }

      const keepCount = Math.min(currentLength, newLength);
      for (let i = 0; i < keepCount; i++) {
        const inst = prop.instanceMap.has(i) ? prop.instanceMap.get(i) : existingInstances[i];
        if (inst) {
          try { applyPropsToInstance(inst, items[i]); } catch {}
          prop.instanceMap.set(i, inst);
        }
      }

      if (!prop.addedInstances) prop.addedInstances = [];
      for (let i = currentLength; i < newLength; i++) {
        const item = items[i];
        const vmName = item._vm != null ? item._vm : prop.itemVMName;
        if (!vmName) {
          console.warn("[RiveWidget:list] cannot add item: item ViewModel name unknown", {
            index: i,
            hint: "ensure the Rive list has at least one default item, or include a _vm field in each item"
          });
          continue;
        }
        let vm, inst;
        try { vm = widgetState.r.viewModelByName(vmName); } catch {}
        try { inst = vm ? vm.instance() : undefined; } catch {}
        if (!inst) {
          console.warn("[RiveWidget:list] could not create item instance", { index: i, vmName });
          continue;
        }
        applyPropsToInstance(inst, item);
        try {
          listAcc.addInstance(inst);
          prop.addedInstances.push(inst);
          prop.instanceMap.set(i, inst);
        } catch (error) {
          console.warn("[RiveWidget:list] addInstance failed", { index: i, error });
        }
      }
    }

    // =========================================================================
    // UI Generator — build dynamic Singular UI model
    // =========================================================================

    function getAvailableArtboards() {
      const artboards = [];
      const file = widgetState.r ? widgetState.r.file : undefined;
      if (!file) return artboards;
      const count = file.artboardCount();
      for (let i = 0; i < count; i++) {
        const ab = file.artboardByIndex(i);
        if (ab) artboards.push(ab.name);
      }
      return artboards;
    }

    function getCurrentArtboardIndex(availableArtboards) {
      const file = widgetState.r ? widgetState.r.file : undefined;
      if (!file) return 0;
      const defaultArtboard = file.defaultArtboard();
      const defaultName = defaultArtboard ? defaultArtboard.name : null;
      for (let i = 0; i < availableArtboards.length; i++) {
        if (availableArtboards[i] === widgetState.artboardName) return i;
        if (!widgetState.artboardName && availableArtboards[i] === defaultName) return i;
      }
      return 0;
    }

    function addArtboardField(fields, artboards, currentIndex) {
      if (artboards.length === 0) return;
      fields.push({
        id: "riveartboard", type: "selection", title: "Artboard",
        defaultValue: currentIndex.toString(),
        selections: artboards.map((name, i) => ({ id: i.toString(), title: name })),
      });
    }

    function addStateMachineField(fields) {
      const names = widgetState.r ? widgetState.r.stateMachineNames : undefined;
      if (!names || names.length === 0) return;
      fields.push({
        id: "rivestatemachineselect", type: "selection", title: "State Machine",
        defaultValue: (widgetState.stateMachineIndex || 0).toString(),
        selections: names.map((name, i) => ({ id: i.toString(), title: name })),
      });
    }

    function resolveGroupInfo(name) {
      let viewModelName = widgetState.defaultVMName || "Main";
      let parentPropertyName = null;
      let groupKey = viewModelName;

      if (name.includes("_") && widgetState.vmMetadata) {
        const parts = name.split("_");
        const pathPrefix = parts[0];
        if (widgetState.vmMetadata[pathPrefix]) {
          viewModelName = widgetState.vmMetadata[pathPrefix].vmName;
          parentPropertyName = widgetState.vmMetadata[pathPrefix].parentProp;
          groupKey = pathPrefix;
        } else {
          parts.pop();
          viewModelName = parts.join(" ");
          groupKey = viewModelName;
        }
      }
      return { groupKey, viewModelName, parentPropertyName };
    }

    function buildArtboardSelections(prop, availableArtboards) {
      let selectedId = "0", defaultValue = "0", selections;
      if (availableArtboards.length > 0) {
        const currentArtboardName = prop.accessor.value;
        const filtered = availableArtboards
          .map((artboardName, originalIndex) => ({ artboardName, originalIndex }))
          .filter(item => item.artboardName !== widgetState.artboardName);
        if (filtered.length > 0) {
          selections = filtered.map(item => {
            if (item.artboardName === currentArtboardName) selectedId = item.originalIndex.toString();
            return { id: item.originalIndex.toString(), title: item.artboardName };
          });
          defaultValue = selectedId;
        }
      }
      return { defaultValue, selections };
    }

    function buildListDefaultValue(prop) {
      const items = [];
      for (let i = 0; i < (prop.accessor.length != null ? prop.accessor.length : 0); i++) {
        try {
          const item = prop.accessor.instanceAt(i);
          if (item) {
            var _fnResult = widgetState._findVMNameForInstance ? widgetState._findVMNameForInstance(item) : null; const vmName = _fnResult != null ? _fnResult : prop.itemVMName;
            if (vmName && !prop.itemVMName) prop.itemVMName = vmName;
            items.push({ ...readInstanceProperties(item) });
          }
        } catch {}
      }
      return items.length > 0 ? JSON.stringify(items, null, 2) : "[]";
    }

    function buildFieldForProperty(name, displayName, prop, availableArtboards) {
      let fieldType = prop.type, defaultValue = "", selections;

      switch (prop.type) {
        case "trigger":  fieldType = "button"; break;
        case "string":   fieldType = "text";     defaultValue = prop.accessor.value != null ? prop.accessor.value : ""; break;
        case "number":   fieldType = "number";   defaultValue = prop.accessor.value != null ? prop.accessor.value : 0; break;
        case "boolean":  fieldType = "checkbox"; defaultValue = prop.accessor.value != null ? prop.accessor.value : false; break;
        case "image":    fieldType = "image"; break;
        case "color":    defaultValue = riveColorValueToRGBA(prop.accessor.value); break;
        case "enumType":
          fieldType = "selection"; defaultValue = (prop.accessor.value != null ? prop.accessor.value : 0).toString();
          if (prop.enumValues && prop.enumValues.length) selections = prop.enumValues.map((v, i) => ({ id: i.toString(), title: v }));
          break;
        case "artboard":
          fieldType = "selection";
          ({ defaultValue, selections } = buildArtboardSelections(prop, availableArtboards));
          break;
        case "list":
          fieldType = "json"; defaultValue = buildListDefaultValue(prop);
          break;
        default: break;
      }

      const field = { id: toAlphanumericId(name), type: fieldType, title: displayName, defaultValue };
      if (fieldType === "number") field.step = "0.1";
      if (fieldType === "json") { field.width = "350"; field.height = "200"; }
      if (selections) field.selections = selections;
      return field;
    }

    function buildGroups(availableArtboards, groupedProperties, viewModelParentInfo) {
      const groups = [];

      if (availableArtboards.length > 0) {
        const childIds = ["riveartboard"];
        if (widgetState.r && widgetState.r.stateMachineNames && widgetState.r.stateMachineNames.length > 0) childIds.push("rivestatemachineselect");
        groups.push({ id: "artboardgroup", title: "Artboard Selection", width: "double", toolTip: "Select the artboard to display", childIds });
      }

      for (const [groupKey, childIds] of Object.entries(groupedProperties)) {
        const groupInfo = viewModelParentInfo[groupKey];
        let groupTitle = groupKey, vmName = groupKey;

        if (groupInfo && groupInfo.parentProp) {
          vmName = groupInfo.vmName;
          const cleanParentProp = groupInfo.parentProp.replace(/[^a-zA-Z0-9]/g, "").toLowerCase();
          if (widgetState.vmMetadata && widgetState.vmMetadata[groupInfo.parentProp]) {
            const parentVMName = widgetState.vmMetadata[groupInfo.parentProp].parentVMName || "Main";
            groupTitle = `${parentVMName} (${cleanParentProp}: ${vmName})`;
          } else {
            groupTitle = `${vmName} - ${cleanParentProp}`;
          }
        } else if (groupInfo && groupInfo.vmName) {
          vmName = groupInfo.vmName;
          groupTitle = vmName;
        }

        groups.push({ id: toAlphanumericId(groupKey) + "group", title: groupTitle, width: "double", toolTip: `Properties from ${vmName}`, childIds });
      }
      return groups;
    }

    function addReferencedFontFields(fields, groups) {
      const fontAssets = Object.values(widgetState.referencedFontAssets);
      if (fontAssets.length === 0) return;

      const fontFieldIds = [];
      for (const { fieldId, assetName } of fontAssets) {
        const displayName = assetName.replace(/\.[^.]+$/, "");
        const stored = widgetState.metricFontData[fieldId];
        const defaultValue = stored
          ? { fontData: stored }
          : { fontData: { family: parseFontFamilyFromAsset(assetName), weight: "400", subset: "auto" } };

        fields.push({ id: fieldId, type: "metricfont", title: displayName, defaultValue });
        fontFieldIds.push(fieldId);
      }

      groups.push({
        id: "rivefontgroup",
        title: "Fonts",
        width: "double",
        toolTip: "Font overrides for referenced text assets in the Rive file",
        activeId: "",
        childIds: fontFieldIds,
      });
    }

    function generateUIModel() {
      const fields = [];
      const groupedProperties = {};
      const viewModelParentInfo = {};

      const availableArtboards = getAvailableArtboards();
      const currentArtboardIndex = getCurrentArtboardIndex(availableArtboards);

      addArtboardField(fields, availableArtboards, currentArtboardIndex);
      addStateMachineField(fields);

      // Dynamic property fields
      for (const [name, prop] of Object.entries(widgetState.riveProps)) {
        if (name.includes("__")) continue;
        const displayName = name.includes("_") ? name.split("_").pop() : name;
        const { groupKey, viewModelName, parentPropertyName } = resolveGroupInfo(name);
        if (!viewModelParentInfo[groupKey]) viewModelParentInfo[groupKey] = { vmName: viewModelName, parentProp: parentPropertyName };
        const field = buildFieldForProperty(name, displayName, prop, availableArtboards);
        if (field) {
          fields.push(field);
          if (!groupedProperties[groupKey]) groupedProperties[groupKey] = [];
          groupedProperties[groupKey].push(field.id);
        }
      }

      const groups = buildGroups(availableArtboards, groupedProperties, viewModelParentInfo);
      addReferencedFontFields(fields, groups);
      const uiModel = { fields, groups };
      SingularWidget.setCustomWidgetUI(uiModel);
    }

    // =========================================================================
    // Rive lifecycle
    // =========================================================================

    function initializeRive(fileUrl) {
      widgetState.riveReady = false;
      const loadGen = (widgetState._loadGen = (widgetState._loadGen != null ? widgetState._loadGen : 0) + 1);

      // Watchdog: if onLoad never fires within 5s, retry once
      const watchdog = setTimeout(() => {
        if (!widgetState.riveReady && widgetState._loadGen === loadGen) {
          reloadRive(widgetState.fileUrl);
        }
      }, 5000);

      const riveConfig = {
        src: fileUrl,
        canvas: document.getElementById("canvas"),
        autoplay: true,
        autoBind: true,
        ...(widgetState.runtime === "webgl2" ? { useOffscreenRenderer: true } : {}),
        layout: new rive.Layout({ fit: rive.Fit[widgetState.layoutFit] }),
        enableFPSCounter: true,

        assetLoader: (asset, bytes) => {
          try {
            // Let Rive handle hosted (CDN) and embedded assets
            if ((asset.cdnUuid != null ? asset.cdnUuid.length : 0) > 0 || (bytes != null ? bytes.length : 0) > 0) return false;

            if (asset.isFont) {
              const fieldId = fontAssetFieldId(asset.name);
              widgetState.referencedFontAssets[fieldId] = {
                asset,
                assetName: asset.name,
                fieldId,
              };
              // Start fetching immediately if font data is already available
              fetchAndApplyFont(fieldId);
              return true;
            }
          } catch { }
          return false;
        },

        onLoad: () => {
          clearTimeout(watchdog);
          resizeCanvas();

          const vmData = getAllViewModelProperties(widgetState.r);
          widgetState.riveProps = vmData.props;
          widgetState.vmMetadata = vmData.vmMetadata;
          widgetState.defaultVMName = vmData.defaultVMName;

          generateUIModel();
          ensureFPSCounter(widgetState.r);
          widgetState.riveReady = true;

          // Guard: only show canvas if this is still the active load
          const genAtLoad = loadGen;
          setTimeout(() => {
            if (widgetState._loadGen === genAtLoad) {
              document.getElementById("canvas").classList.add("ready");
            }
          }, 400);

          if (widgetState.pendingInitialValues) {
            const initialValues = widgetState.pendingInitialValues;
            widgetState.pendingInitialValues = null;
            // Defer outside onLoad — cleanup() inside it freezes the WebGL2 offscreen renderer.
            setTimeout(() => onSingularValue(initialValues), 0);
          }
        },

        onLoadError: () => {},
      };

      if (widgetState.artboardName) riveConfig.artboard = widgetState.artboardName;
      if (widgetState.stateMachineName) riveConfig.stateMachines = widgetState.stateMachineName;
      widgetState.r = new rive.Rive(riveConfig);
    }

    function reloadRive(fileUrl) {
      document.getElementById("canvas").classList.remove("ready");
      widgetState.referencedFontAssets = {};
      if (widgetState.r) { try { widgetState.r.cleanup(); } catch {} widgetState.r = null; }
      initializeRive(fileUrl);
    }

    // =========================================================================
    // Singular event handlers
    // =========================================================================

    function updateDynamicProperties(json) {
      for (const [name, prop] of Object.entries(widgetState.riveProps)) {
        const id = toAlphanumericId(name);
        if (json[id] === undefined) continue;
        try {
          const value = json[id];
          switch (prop.type) {
            case "string": case "number": case "boolean": handleScalarUpdate(prop, value); break;
            case "image":    handleImageUpdate(name, prop, value); break;
            case "enumType": handleEnumUpdate(prop, value); break;
            case "artboard": handleArtboardUpdate(prop, value); break;
            case "color":    handleColorUpdate(prop, value); break;
            case "list":     handleListUpdate(prop, value); break;
          }
        } catch (error) {
          console.warn("[RiveWidget] property apply failed:", { name, id, path: prop.path, type: prop.type, error });
        }
      }
    }

    async function onSingularValue(json) {
      widgetState.pendingInitialValues = widgetState.pendingInitialValues
        ? { ...widgetState.pendingInitialValues, ...json } : json;

      // Consumed rivefont* keys are deleted from pendingInitialValues to avoid a reload loop.
      let fontDataChanged = false;
      for (const [key, value] of Object.entries(json)) {
        if (!key.startsWith("rivefont")) continue;
        var _fontDataRaw = value != null ? value.fontData : undefined; const fontData = _fontDataRaw != null ? _fontDataRaw : value;
        if (!fontData || !fontData.family) continue;
        const incoming = {
          family: fontData.family,
          weight: String(fontData.weight != null ? fontData.weight : "400"),
          subset: fontData.subset != null ? fontData.subset : "auto",
        };
        const existing = widgetState.metricFontData[key];
        const changed = !existing ||
          existing.family !== incoming.family ||
          existing.weight !== incoming.weight;
        widgetState.metricFontData[key] = incoming;
        if (changed && widgetState.referencedFontAssets[key]) fontDataChanged = true;
        if (widgetState.pendingInitialValues) delete widgetState.pendingInitialValues[key];
      }
      // Font changes require a full Rive reload so assetLoader re-supplies new font bytes
      if (fontDataChanged && widgetState.fileUrl) {
        reloadRive(widgetState.fileUrl);
        return;
      }

      // Runtime change
      if (json.rive_renderer !== undefined) {
        const desiredRuntime = json.rive_renderer !== false ? "webgl2" : "canvas";
        const needLoad = !widgetState.runtime || widgetState.runtime !== desiredRuntime || !window.rive;
        if (needLoad) {
          try { await toggleRiveRuntime(desiredRuntime); }
          catch (e) { return; }
        }
      }

      // File URL change
      if (json.rive_file_url !== undefined) {
        if (typeof json.rive_file_url === "string" && json.rive_file_url.endsWith(".riv")) {
          const newFileUrl = json.rive_file_url;
          if (newFileUrl !== widgetState.fileUrl) {
            widgetState.fileUrl = newFileUrl;
            if (json.rive_layout !== undefined) widgetState.layoutFit = widgetState.layoutOptions[parseInt(json.rive_layout, 10)] || "Contain";
            widgetState.artboardName = "";
            widgetState.stateMachineName = "";
            widgetState.stateMachineIndex = 0;
            if (!widgetState.r) initializeRive(newFileUrl); else reloadRive(newFileUrl);
            return;
          }
        } else { return; }
      }

      // Initialize if URL is ready but no instance
      if (!widgetState.r && widgetState.fileUrl && widgetState.fileUrl.endsWith(".riv")) {
        initializeRive(widgetState.fileUrl);
        return;
      }

      // FPS toggle
      if (json.show_fps !== undefined) {
        widgetState.displayFpsCounter = json.show_fps === true;
        if (widgetState.r) ensureFPSCounter(widgetState.r);
      }

      // Layout change
      if (json.rive_layout !== undefined) {
        const newLayout = widgetState.layoutOptions[parseInt(json.rive_layout, 10)] || "Contain";
        if (newLayout !== widgetState.layoutFit) {
          widgetState.layoutFit = newLayout;
          if (widgetState.r && widgetState.fileUrl) { reloadRive(widgetState.fileUrl); return; }
        }
      }

      // Artboard change
      if (json.riveartboard !== undefined && widgetState.r) {
        const artboardIndex = parseInt(json.riveartboard);
        const file = widgetState.r ? widgetState.r.file : undefined;
        if (file && artboardIndex >= 0 && artboardIndex < file.artboardCount()) {
          const artboard = file.artboardByIndex(artboardIndex);
          if (artboard) {
            const newArtboard = typeof artboard.name === "function" ? artboard.name() : artboard.name;
            if (newArtboard !== widgetState.artboardName) {
              widgetState.artboardName = newArtboard;
              widgetState.stateMachineName = "";
              widgetState.stateMachineIndex = 0;
              if (widgetState.fileUrl) { reloadRive(widgetState.fileUrl); return; }
            }
          }
        }
      }

      // State machine change
      if (json.rivestatemachineselect !== undefined && widgetState.r) {
        const smIndex = parseInt(json.rivestatemachineselect);
        if (!isNaN(smIndex) && smIndex >= 0) {
          widgetState.stateMachineIndex = smIndex;
          var _smArr = widgetState.r.stateMachineNames; var _smVal = _smArr != null ? _smArr[smIndex] : undefined; const newName = _smVal != null ? _smVal : "";
          if (newName !== widgetState.stateMachineName) {
            widgetState.stateMachineName = newName;
            if (widgetState.fileUrl) { reloadRive(widgetState.fileUrl); return; }
          }
        }
      }

      if (!widgetState.r || !widgetState.riveReady) return;
      updateDynamicProperties(json);
    }

    function onSingularButtonClicked(action) {
      for (const [name, prop] of Object.entries(widgetState.riveProps)) {
        if (toAlphanumericId(name) === action && prop && prop.type === "trigger") {
          prop.accessor.trigger();
          return;
        }
      }
    }

    // =========================================================================
    // Entry point
    // =========================================================================

    SingularWidget.init({
      onInit: async (json) => {
        widgetState.pendingInitialValues = json;
        const layoutIndex = parseInt(json.rive_layout, 10);
        widgetState.layoutFit = (widgetState.layoutOptions && widgetState.layoutOptions[layoutIndex]) || widgetState.layoutFit || "Contain";
        if (json.show_fps !== undefined) widgetState.displayFpsCounter = json.show_fps;
        if (json.rive_renderer !== undefined) {
          const desiredRuntime = json.rive_renderer ? "webgl2" : "canvas";
          try {
            await toggleRiveRuntime(desiredRuntime);
          } catch {
            try { await toggleRiveRuntime("canvas"); } catch {}
          }
        }
        if (typeof json.rive_file_url === "string" && json.rive_file_url.endsWith(".riv")) {
          widgetState.fileUrl = json.rive_file_url;
          initializeRive(json.rive_file_url);
        }
      },
      onValue: onSingularValue,
      onButtonClicked: onSingularButtonClicked,
    });
    </script>
  </body>
